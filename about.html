  <section id="contact" class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <h2 class="text-center mb-4 text-primary fw-bold">聯絡我們</h2>
        <p class="text-center text-muted mb-5">如果您有任何合作機會或問題，歡迎填寫下方表單與我聯絡！</p>
        <form action="#" method="POST">
          <div class="mb-3">
            <label for="userName" class="form-label fw-semibold">您的姓名</label>
            <input type="text" class="form-control" id="userName" placeholder="請輸入您的名字" required>
          </div>
          <div class="mb-3">
            <label for="userEmail" class="form-label fw-semibold">電子信箱</label>
            <input type="email" class="form-control" id="userEmail" placeholder="name@example.com" required>
          </div>
          <div class="mb-3">
            <label for="userSubject" class="form-label fw-semibold">主旨</label>
            <input type="text" class="form-control" id="userSubject" placeholder="請輸入郵件主旨" required>
          </div>
          <div class="mb-4">
            <label for="userMessage" class="form-label fw-semibold">訊息內容</label>
            <textarea class="form-control" id="userMessage" rows="5" placeholder="請輸入您想對我說的話..." required></textarea>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg shadow-sm">送出訊息</button>
          </div>

        </form>

      </div>
    </div>
  </section>

  <script src="js/bootstrap.bundle.min.js"></script>
